<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NumPlay">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>NumPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; min-height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 15% 85%, rgba(255,255,255,0.18) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(255,255,255,0.14) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .app { position: relative; z-index: 1; width: 100%; max-width: 560px; max-height: 95vh; max-height: 95dvh; overflow-y: auto; padding: 10px 12px; }
        .app::-webkit-scrollbar { width: 0; }

        .card {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-radius: 28px; padding: 30px; margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,255,255,0.6);
            color: #1a1a2e;
        }

        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 68px; height: 68px; border-radius: 20px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); box-shadow: 0 10px 30px rgba(99,102,241,0.35); }
        .logo-title { font-size: 30px; font-weight: 800; }
        .logo-title span { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 13px; color: #94a3b8; margin-top: 6px; font-weight: 600; }

        .menu-card {
            display: flex; align-items: center; gap: 16px;
            padding: 20px 24px; border-radius: 18px; margin-bottom: 12px;
            border: 2px solid #e2e8f0; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            background: #fff; position: relative; overflow: hidden;
        }
        .menu-card::after {
            content: ''; position: absolute; top: 0; right: 0; width: 100px; height: 100%;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .menu-card.g1::after { background: linear-gradient(270deg, rgba(249,115,22,0.06), transparent); }
        .menu-card.g2::after { background: linear-gradient(270deg, rgba(16,185,129,0.06), transparent); }
        .menu-card.g3::after { background: linear-gradient(270deg, rgba(59,130,246,0.06), transparent); }
        .menu-card.g4::after { background: linear-gradient(270deg, rgba(239,68,68,0.06), transparent); }
        .menu-card.g5::after { background: linear-gradient(270deg, rgba(139,92,246,0.06), transparent); }
        .menu-card.g6::after { background: linear-gradient(270deg, rgba(6,182,212,0.06), transparent); }
        .menu-card.g7::after { background: linear-gradient(270deg, rgba(217,70,239,0.06), transparent); }
        .menu-card.g8::after { background: linear-gradient(270deg, rgba(245,158,11,0.06), transparent); }
        .menu-card.g9::after { background: linear-gradient(270deg, rgba(16,185,129,0.06), transparent); }
        .menu-card:hover::after { opacity: 1; }
        .menu-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
        .menu-card.g1:hover { border-color: #f97316; }
        .menu-card.g2:hover { border-color: #10b981; }
        .menu-card.g3:hover { border-color: #3b82f6; }
        .menu-card.g4:hover { border-color: #ef4444; }
        .menu-card.g5:hover { border-color: #8b5cf6; }
        .menu-card.g6:hover { border-color: #06b6d4; }
        .menu-card.g7:hover { border-color: #d946ef; }
        .menu-card.g8:hover { border-color: #f59e0b; }
        .menu-card.g9:hover { border-color: #10b981; }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
        @media (min-width: 561px) {
            .menu-grid { grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
            .menu-card { margin-bottom: 0; padding: 20px; }
            .mc-badge { width: 52px; height: 52px; font-size: 24px; }
            .mc-title { font-size: 14px; }
            .mc-desc { font-size: 11px; }
            .app { max-width: 820px; }
        }
        .mc-badge {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; flex-shrink: 0; position: relative; z-index: 1;
        }
        .mc-body { position: relative; z-index: 1; flex: 1; min-width: 0; }
        .mc-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; color: #1a1a2e; }
        .mc-desc { font-size: 11px; color: #94a3b8; line-height: 1.5; font-weight: 500; }
        .mc-arrow { margin-left: auto; color: #d1d5db; font-size: 18px; transition: all 0.3s; position: relative; z-index: 1; flex-shrink: 0; }
        .menu-card:hover .mc-arrow { transform: translateX(3px); color: #9ca3af; }

        .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .back-btn {
            width: 40px; height: 40px; border-radius: 12px; border: 2px solid #e2e8f0;
            background: #fff; color: #6366f1; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-weight: 700;
        }
        .back-btn:hover { background: #6366f1; color: #fff; border-color: #6366f1; }
        .top-info h2 { font-size: 19px; font-weight: 800; }
        .top-info p { font-size: 11px; color: #94a3b8; font-weight: 600; }

        .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
        .pill {
            padding: 7px 14px; border: 2px solid #e2e8f0; border-radius: 20px;
            background: #fff; color: #64748b; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .pill.on { border-color: #6366f1; background: #eef2ff; color: #6366f1; }
        .pill:hover { border-color: #a78bfa; }

        .input-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .input-bar .field { flex: 1; min-width: 0; }
        .input-bar .btn { flex-shrink: 0; }
        .field {
            flex: 1; padding: 13px 16px; border: 2px solid #e2e8f0; border-radius: 14px;
            background: #fff; color: #1a1a2e; font-size: 15px; font-weight: 600;
            outline: none; transition: all 0.2s; font-family: inherit;
        }
        .field:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.08); }
        .field::placeholder { color: #cbd5e1; }
        .field.center { text-align: center; font-size: 20px; letter-spacing: 3px; }
        .btn {
            padding: 13px 24px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; font-family: inherit; white-space: nowrap;
            box-shadow: 0 4px 16px rgba(99,102,241,0.3);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
        .btn:active { transform: translateY(0); }
        .btn.green { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 16px rgba(16,185,129,0.3); }

        .range-bar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; }
        .range-box {
            padding: 10px 20px; border-radius: 14px; font-size: 26px; font-weight: 800;
            background: linear-gradient(135deg, #eef2ff, #e0e7ff); border: 2px solid #c7d2fe;
            color: #6366f1; min-width: 52px; text-align: center;
        }
        .range-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; }

        .fb-card {
            padding: 14px; border-radius: 14px; margin-bottom: 16px;
            text-align: center; transition: all 0.3s; min-height: 50px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
        }
        .fb-card .l1 { font-size: 16px; font-weight: 800; }
        .fb-card .l2 { font-size: 12px; font-weight: 600; }
        .fb-card.high { background: #fef2f2; border: 2px solid #fecaca; }
        .fb-card.high .l1 { color: #dc2626; }
        .fb-card.low { background: #eff6ff; border: 2px solid #bfdbfe; }
        .fb-card.low .l1 { color: #2563eb; }
        .fb-card.ok { background: #f0fdf4; border: 2px solid #bbf7d0; }
        .fb-card.ok .l1 { color: #16a34a; }
        .fb-card.err { background: #fffbeb; border: 2px solid #fde68a; }
        .fb-card.err .l1 { color: #d97706; }
        .fb-card .l2.clo { color: #e17055; }
        .fb-card .l2.near { color: #10b981; }
        .fb-card .l2.far { color: #ef4444; }

        .chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 12px 0; min-height: 26px; }
        .chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .chip.high { background: #fef2f2; color: #dc2626; border: 1.5px solid #fecaca; }
        .chip.low { background: #eff6ff; color: #2563eb; border: 1.5px solid #bfdbfe; }
        .chip.ok { background: #f0fdf4; color: #16a34a; border: 1.5px solid #bbf7d0; }

        .chat-box {
            overflow-y: auto; padding: 14px; background: #f8fafc;
            border: 2px solid #e2e8f0; border-radius: 16px;
            margin-bottom: 10px; min-height: 260px; max-height: 340px;
        }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .m { display: flex; margin-bottom: 8px; }
        .m.user { justify-content: flex-end; }
        .m .b { max-width: 82%; padding: 9px 13px; border-radius: 13px; font-size: 13px; line-height: 1.5; font-weight: 600; }
        .m.user .b { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border-bottom-right-radius: 4px; }
        .m.ai .b { background: #fff; color: #334155; border: 1.5px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .m.ai .b b.yes { color: #10b981; }
        .m.ai .b b.no { color: #ef4444; }
        .m.ai .b b.win { color: #f59e0b; }
        .m.sys .b { background: #eef2ff; color: #6366f1; font-size: 11px; text-align: center; max-width: 100%; border-radius: 10px; border: 1.5px solid #c7d2fe; }

        .quick-bar { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .qp {
            padding: 6px 12px; border: 1.5px solid #e2e8f0; border-radius: 20px;
            background: #fff; color: #64748b; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .qp:hover { background: #eef2ff; border-color: #6366f1; color: #6366f1; }

        .board { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; align-items: center; }
        .brow { display: flex; gap: 7px; }
        .bc {
            width: 50px; height: 50px; border: 2.5px solid #e2e8f0;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: #1a1a2e; background: #fff;
        }
        .bc.cur { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.12); }
        .bc.filled { border-color: #6366f1; }
        .bc.g { background: linear-gradient(135deg, #22c55e, #16a34a); border-color: #22c55e; color: #fff; }
        .bc.y { background: linear-gradient(135deg, #eab308, #ca8a04); border-color: #eab308; color: #fff; }
        .bc.x { background: #94a3b8; border-color: #94a3b8; color: #fff; }

        .leg { display: flex; gap: 14px; justify-content: center; margin-bottom: 16px; font-size: 11px; font-weight: 700; color: #64748b; }
        .leg-i { display: flex; align-items: center; gap: 4px; }
        .leg-d { width: 12px; height: 12px; border-radius: 3px; }

        .stats-bar {
            display: flex; justify-content: space-around;
            padding: 12px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 14px; margin-top: 12px;
        }
        .st { text-align: center; }
        .st .v { color: #6366f1; font-size: 22px; font-weight: 800; }
        .st .l { color: #94a3b8; font-size: 10px; margin-top: 2px; font-weight: 700; }

        .hidden { position: absolute; opacity: 0; width: 0; height: 0; }

        .vkb {
            display: none;
        }
        .mobile-input { display: none; }
        .desktop-input { display: block; }
        @media (max-width: 560px) {
            .vkb {
                display: grid; grid-template-columns: repeat(3, 1fr);
                gap: 6px; margin-bottom: 10px; max-width: 240px; margin-left: auto; margin-right: auto;
            }
            .mobile-input { display: block; }
            .desktop-input { display: none; }
            .vkb-key { height: 44px; font-size: 17px; border-radius: 10px; }
            .vkb-key.del { font-size: 20px; }
        }
        .vkb-key {
            height: 54px; border-radius: 14px;
            border: none; background: #f1f5f9; color: #1a1a2e;
            font-size: 20px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.12s; font-family: inherit;
            box-shadow: 0 2px 0 #d1d5db;
            -webkit-tap-highlight-color: transparent;
        }
        .vkb-key:active { transform: translateY(2px); box-shadow: none; background: #e2e8f0; }
        .vkb-key.action { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; box-shadow: 0 2px 0 #4f46e5; }
        .vkb-key.action:active { background: #4f46e5; box-shadow: none; }
        .vkb-key.del { background: #fee2e2; color: #dc2626; box-shadow: 0 2px 0 #fca5a5; font-size: 16px; }
        .vkb-key.del:active { background: #fecaca; box-shadow: none; }

        .ms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .ms-opt {
            padding: 18px; border-radius: 14px; border: 2px solid #e2e8f0;
            background: #fff; color: #1a1a2e; font-size: 24px; font-weight: 800;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
            text-align: center; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; user-select: none;
        }
        .ms-opt:active { background: #eef2ff; border-color: #6366f1; transform: scale(0.96); }

        .nm-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
        .nm-cell {
            height: 52px; border-radius: 12px; border: 2px solid #e2e8f0;
            background: #fff; color: #1a1a2e; font-size: 20px; font-weight: 800;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none;
        }
        .nm-cell:active { transform: scale(0.95); }
        .nm-cell.selected { border-color: #06b6d4; background: #ecfeff; color: #06b6d4; }
        .nm-cell.found { border-color: #10b981; background: #d1fae5; color: #10b981; opacity: 0.6; }

        .nm-stat { text-align: center; min-width: 60px; }
        .nm-stat-val { font-size: 32px; font-weight: 800; }
        .nm-stat-lbl { font-size: 9px; color: #94a3b8; font-weight: 700; letter-spacing: 0.5px; }
        .nm-target-bar {
            display: flex; align-items: center; justify-content: center; gap: 14px;
            background: linear-gradient(135deg, #ecfeff, #f0f9ff);
            border: 2px solid #a5f3fc; border-radius: 14px;
            padding: 10px 16px; margin-bottom: 10px;
        }
        .nm-target-num { font-size: 32px; font-weight: 900; color: #06b6d4; text-shadow: 0 0 20px rgba(6,182,212,0.3); }
        .nm-target-item { font-size: 11px; color: #64748b; font-weight: 600; }
        .nm-target-item b { color: #1a1a2e; }

        .pc-card {
            aspect-ratio: 1; border-radius: 12px; border: 2px solid #e2e8f0;
            background: linear-gradient(135deg, #f5f3ff, #fdf4ff);
            color: #1a1a2e; font-size: 20px; font-weight: 800;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none;
            position: relative; min-height: 56px;
        }
        .pc-card:active { transform: scale(0.95); }
        .pc-card .pc-num { font-size: 22px; font-weight: 800; color: #1a1a2e; }
        .pc-card .pc-back { font-size: 20px; color: #c4b5fd; }
        .pc-card.flipped { border-color: #d946ef; background: #fff; box-shadow: 0 2px 12px rgba(217,70,239,0.15); }
        .pc-card.flipped .pc-num { color: #d946ef; }
        .pc-card.matched { border-color: #10b981; background: #d1fae5; }
        .pc-card.matched .pc-num { color: #10b981; }

        .pg-num {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 48px; height: 48px; padding: 0 12px;
            border-radius: 12px; background: #fffbeb; border: 2px solid #fde68a;
            font-size: 20px; font-weight: 800; color: #92400e;
        }
        .pg-unknown { background: #fef3c7; border-color: #f59e0b; color: #f59e0b; font-size: 24px; }
        .pg-opt {
            padding: 16px; border-radius: 14px; border: 2px solid #e2e8f0;
            background: #fff; color: #1a1a2e; font-size: 22px; font-weight: 800;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
            text-align: center; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; user-select: none;
        }
        .pg-opt:active { background: #fffbeb; border-color: #f59e0b; transform: scale(0.96); }

        .nc-cell {
            aspect-ratio: 1; border-radius: 10px; border: 2px solid #e2e8f0;
            background: #f8fafc; color: #1a1a2e; font-size: 18px; font-weight: 800;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none;
            min-height: 40px;
        }
        .nc-cell:active { transform: scale(0.9); }

        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #fff; border-radius: 28px; padding: 40px 36px; text-align: center;
            max-width: 360px; width: 90%; box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            animation: popUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-box h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .modal-box p { color: #64748b; font-size: 14px; margin-bottom: 4px; font-weight: 600; }
        .modal-box .btn { margin-top: 16px; }
        .modal-emoji { font-size: 48px; margin-bottom: 12px; }

        .float-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .shape { position: absolute; border-radius: 50%; filter: blur(1px); }
        .shape:nth-child(1) { width: 300px; height: 300px; background: rgba(255,255,255,0.18); top: -80px; left: -100px; animation: fl1 8s ease-in-out infinite; }
        .shape:nth-child(2) { width: 220px; height: 220px; background: rgba(251,191,36,0.2); top: 55%; right: -70px; animation: fl2 10s ease-in-out infinite; }
        .shape:nth-child(3) { width: 160px; height: 160px; background: rgba(52,211,153,0.18); bottom: -50px; left: 25%; animation: fl3 9s ease-in-out infinite; }
        .shape:nth-child(4) { width: 120px; height: 120px; background: rgba(236,72,153,0.15); top: 30%; left: -40px; animation: fl2 11s ease-in-out infinite; }
        .shape:nth-child(5) { width: 180px; height: 180px; background: rgba(99,102,241,0.12); top: 10%; right: 10%; animation: fl1 12s ease-in-out infinite; }
        @keyframes fl1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-30px) scale(1.05)} }
        @keyframes fl2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-15px,20px) scale(1.08)} 66%{transform:translate(10px,-15px) scale(0.95)} }
        @keyframes fl3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(25px,20px) scale(1.1)} }

        .install-banner {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #fff; border-radius: 16px; padding: 14px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 200;
            font-size: 13px; font-weight: 700; color: #1a1a2e;
            align-items: center; gap: 12px; border: 2px solid #e2e8f0;
        }
        .install-banner.show { display: flex; }
        .install-banner .btn { padding: 8px 16px; font-size: 12px; }
        .install-close { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; padding: 4px; }

        @media (max-width: 560px) {
            .app { padding: 6px 8px; }
            .card { padding: 20px; border-radius: 20px; }
            .logo-icon { width: 56px; height: 56px; font-size: 26px; }
            .logo-title { font-size: 24px; }
            .logo-sub { font-size: 12px; }
            .logo-area { margin-bottom: 24px; }
            .menu-card { padding: 16px; gap: 14px; border-radius: 16px; }
            .mc-badge { width: 44px; height: 44px; font-size: 20px; border-radius: 12px; }
            .mc-title { font-size: 14px; }
            .mc-desc { font-size: 10px; }
            .top-bar { gap: 10px; margin-bottom: 16px; }
            .back-btn { width: 36px; height: 36px; font-size: 16px; }
            .top-info h2 { font-size: 17px; }
            .pill { padding: 6px 12px; font-size: 10px; }
            .input-bar { gap: 6px; }
            .input-bar .btn { padding: 12px 16px; font-size: 13px; }
            .field { padding: 12px 14px; font-size: 14px; border-radius: 12px; }
            .field.center { font-size: 18px; }
            .btn { padding: 12px 20px; font-size: 13px; border-radius: 12px; }
            .range-box { padding: 8px 16px; font-size: 22px; min-width: 44px; }
            .range-bar { gap: 10px; }
            .fb-card { padding: 12px; min-height: 44px; }
            .fb-card .l1 { font-size: 15px; }
            .fb-card .l2 { font-size: 11px; }
            .chip { padding: 4px 10px; font-size: 11px; }
            .chat-box { min-height: 220px; max-height: 280px; padding: 12px; }
            .m .b { font-size: 12px; padding: 8px 11px; }
            .quick-bar { gap: 4px; }
            .qp { padding: 5px 10px; font-size: 10px; }
            .bc { width: 38px; height: 38px; font-size: 16px; border-radius: 8px; }
            .brow { gap: 4px; }
            .board { gap: 4px; margin-bottom: 10px; }
            .leg { gap: 8px; font-size: 9px; margin-bottom: 10px; }
            .range-box { padding: 7px 12px; font-size: 18px; min-width: 38px; border-radius: 10px; }
            .range-bar { gap: 8px; margin-bottom: 10px; }
            .fb-card { padding: 10px; min-height: 38px; margin-bottom: 10px; }
            .fb-card .l1 { font-size: 13px; }
            .fb-card .l2 { font-size: 10px; }
            .chips { margin: 8px 0; gap: 4px; }
            .chip { padding: 3px 8px; font-size: 10px; }
            .stats-bar { padding: 8px; margin-top: 8px; }
            .st .v { font-size: 18px; }
            .st .l { font-size: 8px; }
            .card { padding: 16px; border-radius: 18px; }
            .top-bar { margin-bottom: 12px; gap: 8px; }
            .back-btn { width: 32px; height: 32px; font-size: 14px; }
            .top-info h2 { font-size: 16px; }
            .pill { padding: 5px 10px; font-size: 9px; }
            .pill-row { margin-bottom: 10px; }
            .modal-box { padding: 28px 24px; border-radius: 20px; }
            .modal-box h2 { font-size: 22px; }
            .modal-emoji { font-size: 40px; }
            .install-banner { padding: 10px 18px; font-size: 12px; bottom: 12px; }
            .vkb-key { height: 48px; font-size: 18px; border-radius: 12px; }
            .ms-opt { padding: 16px; font-size: 22px; border-radius: 12px; }
            .ms-grid { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="float-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>
<div class="app" id="app"></div>
<div class="modal" id="modal">
    <div class="modal-box">
        <div class="modal-emoji" id="mE"></div>
        <h2 id="mT"></h2>
        <p id="m1"></p>
        <p id="m2"></p>
        <button class="btn green" id="mB">Main Lagi</button>
    </div>
</div>
<div class="install-banner" id="installBanner">
    <span>Install NumPlay?</span>
    <button class="btn" id="installBtn">Install</button>
    <button class="install-close" id="installClose">&times;</button>
</div>

<script>
var NumPlay = {
    currentGame: null,
    games: {},
    deferredPrompt: null,

    el: function(id) { return document.getElementById(id); },

    register: function(game) {
        this.games[game.id] = game;
    },

    launch: function(id) {
        this.stopAll();
        this.currentGame = id;
        var old = document.getElementById('N_hid');
        if (old) old.remove();
        if (this.games[id]) this.games[id].render();
    },

    stopAll: function() {
        for (var id in this.games) {
            var g = this.games[id];
            if (g.stopMusic) g.stopMusic();
            if (g.state) {
                if (g.state.timer) { clearInterval(g.state.timer); g.state.timer = null; }
                if (g.state.active !== undefined) g.state.active = false;
            }
        }
    },

    showMenu: function() {
        this.stopAll();
        this.currentGame = null;
        var old = document.getElementById('N_hid');
        if (old) old.remove();

        var html = '<div class="card">' +
            '<div class="logo-area">' +
            '<div class="logo-icon">\ud83c\udfb2</div>' +
            '<div class="logo-title"><span>Number Games</span></div>' +
            '<div class="logo-sub">Tebak, cocokkan, pecahkan</div>' +
            '</div>' +
            '<div class="menu-grid">';

        for (var id in this.games) {
            var g = this.games[id];
            html += '<div class="menu-card g' + ({guessing:1,numberle:2,detective:3,mathsprint:4,memory:5,match:6,pairs:7,pattern:8,clear:9}[id]||'') + '" data-game="' + id + '" style="border-left:4px solid ' + g.color + '">' +
                '<div class="mc-badge" style="background:' + g.bg + ';color:' + g.color + '">' + g.icon + '</div>' +
                '<div class="mc-body"><div class="mc-title">' + g.name + '</div><div class="mc-desc">' + g.desc + '</div></div>' +
                '<div class="mc-arrow">\u203a</div></div>';
        }
        html += '</div></div>';
        this.el('app').innerHTML = html;

        var self = this;
        document.querySelectorAll('.menu-card').forEach(function(c) {
            c.onclick = function() { self.launch(this.getAttribute('data-game')); };
        });
    },

    topBar: function(title, sub) {
        return '<div class="top-bar">' +
            '<button class="back-btn" onclick="NumPlay.showMenu()">\u2190</button>' +
            '<div class="top-info"><h2>' + title + '</h2><p>' + sub + '</p></div></div>';
    },

    pills: function(list, active, fn) {
        var h = '<div class="pill-row">';
        for (var i = 0; i < list.length; i++) {
            h += '<button class="pill' + (i === active ? ' on' : '') + '" onclick="' + fn + '(' + i + ',this)">' + list[i] + '</button>';
        }
        return h + '</div>';
    },

    setActivePill: function(el) {
        document.querySelectorAll('.pill').forEach(function(b) { b.classList.remove('on'); });
        el.classList.add('on');
    },

    sfx: function(file) {
        try { var a = new Audio('sounds/' + file); a.volume = 0.4; a.play().catch(function(){}); } catch(e) {}
    },

    vkb: function(inputId, onSubmit) {
        return '<div class="vkb">' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'1\')">1</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'2\')">2</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'3\')">3</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'4\')">4</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'5\')">5</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'6\')">6</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'7\')">7</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'8\')">8</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'9\')">9</button>' +
            '<button class="vkb-key del" style="font-size:22px" onclick="NumPlay.vkbDel(\'' + inputId + '\')">X</button>' +
            '<button class="vkb-key" onclick="NumPlay.vkbPress(\'' + inputId + '\',\'0\')">0</button>' +
            '<button class="vkb-key action" onclick="' + onSubmit + '">OK</button>' +
            '</div>';
    },

    vkbPress: function(inputId, digit) {
        var inp = this.el(inputId);
        if (!inp) return;
        var max = inp.maxLength;
        if (max > 0 && inp.value.length >= max) return;
        inp.value += digit;
        inp.dispatchEvent(new Event('input'));
        var display = this.el(inputId.replace('_inp', '_display'));
        if (display) display.textContent = inp.value || '?';
    },

    vkbDel: function(inputId) {
        var inp = this.el(inputId);
        if (!inp) return;
        inp.value = inp.value.slice(0, -1);
        inp.dispatchEvent(new Event('input'));
        var display = this.el(inputId.replace('_inp', '_display'));
        if (display) display.textContent = inp.value || '?';
    },

    showModal: function(emoji, title, l1, l2, cb) {
        this.el('mE').textContent = emoji;
        this.el('mT').textContent = title;
        this.el('m1').textContent = l1;
        this.el('m2').textContent = l2;
        this.el('modal').classList.add('show');
        var self = this;
        this.el('mB').onclick = function() { self.el('modal').classList.remove('show'); if (cb) cb(); };
    }
};

window.addEventListener('beforeinstallprompt', function(e) {
    NumPlay.deferredPrompt = e;
    setTimeout(function() {
        NumPlay.el('installBanner').classList.add('show');
    }, 2000);
    NumPlay.el('installBtn').onclick = function() {
        NumPlay.el('installBanner').classList.remove('show');
        if (NumPlay.deferredPrompt) {
            NumPlay.deferredPrompt.prompt();
            NumPlay.deferredPrompt.userChoice.then(function() { NumPlay.deferredPrompt = null; });
        }
    };
    NumPlay.el('installClose').onclick = function() { NumPlay.el('installBanner').classList.remove('show'); };
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js');
    });
}
</script>

<script src="games/guessing.js"></script>
<script src="games/numberle.js"></script>
<script src="games/detective.js"></script>
<script src="games/mathsprint.js"></script>
<script src="games/memory.js"></script>
<script src="games/match.js"></script>
<script src="games/pairs.js"></script>
<script src="games/pattern.js"></script>
<script src="games/clear.js"></script>

<script>NumPlay.showMenu();</script>
</body>
</html>
